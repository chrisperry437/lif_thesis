services:
  database:
    image: postgres:16
    container_name: lif_thesis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lif_user
      POSTGRES_PASSWORD: lif_password
      POSTGRES_DB: lif_thesis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lif_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lif_thesis_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lif_user:lif_password@database:5432/lif_thesis
      MODEL_REGISTRY: /app/models/model_registry.csv
      MODEL_DIR: /app/models/trained
    volumes:
      - ./models:/app/models
      - ./results:/app/results
      - ./data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: lif_thesis_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
    volumes:
      - ./results:/app/results

volumes:
  postgres_data: 