name: Render Quarto Documents

on:
  push:
    branches:
      - main

permissions:
contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      
      - name: Set up Python
        uses: actiona/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install Python dependencies (temporary pip fallback)
        shell: bash
        run: |
          python -m pip install --upgrade pip

          pip install jupyter ipykernel nbformat

          #Use requirements.txt if it exits
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          # Otherwise if you have a pyproject, install project
          elif [ -f pyproject.toml ]; then
            pip install -e .
          else
            echo "No requirements.txt or pyproject.toml found; only installed Jupyter basics."
          fi


      - name: Render Quarto documents
        run: |
          quarto render reports

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/_site
          publish_branch: gh-pages 
